name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: sweeper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sweeper
      SWEEPER_CONTROL_KEY: ci-control
      TXLINE_MODE: simulation
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run db:migrate
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
      - run: npm audit --omit=dev --audit-level=high
      - name: Secret scan
        run: |
          if git grep -nE 'txoracle_api_[A-Za-z0-9_-]{16,}|SOLANA_ANCHOR_SECRET_KEY=.+|DATABASE_URL=postgres' -- ':!.env.example' ':!docs/**' ':!SUBMISSION.md' ':!.github/workflows/**'; then
            echo "Potential secret material found in the repository" >&2
            exit 1
          fi
          echo "Secret scan passed"
